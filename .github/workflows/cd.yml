name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test

      - name: Build backend
        run: npm run build

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_VM_SSH_KEY }}" > ~/.ssh/eventory_deploy_key
          chmod 600 ~/.ssh/eventory_deploy_key
          ssh-keyscan -H "${{ secrets.GCP_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/eventory_deploy_key \
            "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" \
            'set -e
             cd ~/Eventory
             git pull origin main
             test -f .env
             docker compose -f docker-compose.prod.yml up -d --build
             curl -f http://localhost/health
             docker compose -f docker-compose.prod.yml ps'