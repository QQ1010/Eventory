services:
  caddy:
    image: caddy:2
    container_name: eventory-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    build:
      context: .
      target: runtime
    image: eventory-app:local
    container_name: eventory-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      - mongodb
      - redis
      - elasticsearch

  worker:
    image: eventory-app:local
    container_name: eventory-worker
    restart: unless-stopped
    command: ["node", "dist/workers/event.worker.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      - mongodb
      - redis
      - elasticsearch

  mongodb:
    image: mongo:7
    container_name: eventory-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    container_name: eventory-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: eventory-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  mongodb_data:
  redis_data:
  es_data:
  caddy_data:
  caddy_config: